name = "blog-reactions"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# D1 binding — create the DB with:
#   pnpm wrangler d1 create blog-reactions
# then paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "blog-reactions"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Required secrets (set via `wrangler secret put`):
#   TURNSTILE_SECRET — Cloudflare Turnstile secret key
#
# Optional vars:
[vars]
ALLOWED_ORIGIN = "https://REPLACE_WITH_YOUR_SITE"
